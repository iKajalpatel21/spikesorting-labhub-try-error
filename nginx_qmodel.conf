# Standalone Nginx configuration for QModel with SSL/TLS
# For use with: sudo nginx -c /path/to/this/file

# Main nginx context
user nobody;
worker_processes auto;
error_log /Users/kajalpatel/spikesorting-labhub-try-error/logs/nginx_error.log;
pid /tmp/nginx_qmodel.pid;

events {
    worker_connections 1024;
    use kqueue;  # macOS optimization
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /Users/kajalpatel/spikesorting-labhub-try-error/logs/nginx_access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream definition
    upstream qmodel_app {
        server 127.0.0.1:8000 fail_timeout=0;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name localhost;
        
        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name localhost;

        # SSL Configuration
        ssl_certificate /Users/kajalpatel/spikesorting-labhub-try-error/ssl/certificate.crt;
        ssl_certificate_key /Users/kajalpatel/spikesorting-labhub-try-error/ssl/private.key;
        ssl_dhparam /Users/kajalpatel/spikesorting-labhub-try-error/ssl/dhparam.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Basic Settings
        client_max_body_size 100M;
        keepalive_timeout 5;

        # Main application
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_buffering off;
            proxy_pass http://qmodel_app;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Static files
        location /static/ {
            alias /Users/kajalpatel/spikesorting-labhub-try-error/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /health/ {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}

# ============================================================
# SpikesortingLabHub — Docker Compose
#
# Bind-mount layout (host path → container path):
#
#   trurnasdata   /mnt/root_data_storage/users/lhss/trurnasdata → /data          (read-only  — NAS database)
#   persistentdata /mnt/root_data_storage/users/lhss/persistentdata → /django_db (read/write — Django DB + logs)
#   experiments   /mnt/root_data_storage/experiments           → /experiments    (read-only  — binary recordings)
#
# Usage:
#   HTTP:   docker compose up
#   HTTPS:  LABHUB_HTTPS=true docker compose up
# ============================================================

services:
  labhub:
    build: .
    image: labhub:latest
    restart: unless-stopped

    ports:
      - "8000:8000"   # HTTP
      - "8443:8443"   # HTTPS (only active when cert/key are present)

    environment:
      # Django core
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      DJANGO_DEBUG: "False"

      # Database lives on the persistentdata mount
      DATABASE_PATH: "/django_db/db.sqlite3"

      # Tell Django where the NAS root is so $NAS$ placeholders resolve
      NAS_ROOT: "/data"

      # Scan these directories for .bin / .prb data files
      DATA_DIRS: "/experiments,/experiments/probes"

    volumes:
      # trurnasdata — NAS database (read-only)
      - type: bind
        source: /mnt/root_data_storage/users/lhss/trurnasdata
        target: /data
        read_only: true

      # persistentdata — Django SQLite DB + logs (read/write)
      - type: bind
        source: /mnt/root_data_storage/users/lhss/persistentdata
        target: /django_db

      # experiments — binary recording files (read-only)
      - type: bind
        source: /mnt/root_data_storage/experiments
        target: /experiments
        read_only: true

      # secrets — SSL certs generated on the host by deploy.sh (read-only)
      - type: bind
        source: ./secrets
        target: /app/secrets
        read_only: true

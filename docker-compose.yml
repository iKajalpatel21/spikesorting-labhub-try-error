# ============================================================
# SpikesortingLabHub — Docker Compose
#
# Bind-mount layout (host path → container path):
#
#   trurnasdata   /mnt/root_data_storage/users/sslh/trurnasdata → /data          (read-only  — NAS database)
#   persistentdata /mnt/root_data_storage/users/sslh/persistentdata → /django_db (read/write — Django DB + logs)
#   experiments   /mnt/root_data_storage/experiments           → /experiments    (read-only  — binary recordings)
#
# Ports 8000, 8080, and 8443 are used by the NAS itself — avoid them.
#
# Usage:
#   export DJANGO_SECRET_KEY="your-secret-key"
#   ./deploy.sh          # generates secrets/cert.crt and cert.key if missing
#   docker compose build
#   docker compose up -d
# ============================================================

services:
  spikesorting-labhub:
    build: .
    image: spikesorting-labhub:latest
    restart: unless-stopped

    command:
      - gunicorn
      - -c
      - gunicorn.conf.py
      - --certfile=/app/secrets/cert.crt
      - --keyfile=/app/secrets/cert.key
      - -b
      - 0.0.0.0:9443
      - labhub.wsgi:application

    ports:
      - "9443:9443"   # HTTPS — Gunicorn binds here via command: override above

    environment:
      # Django core
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      DJANGO_DEBUG: "False"

      # Database lives on the persistentdata mount
      DATABASE_PATH: "/django_db/db.sqlite3"

      # Tell Django where the NAS root is so $NAS$ placeholders resolve
      NAS_ROOT: "/data"

      # Scan these directories for .bin / .prb data files
      DATA_DIRS: "/experiments,/experiments/probes"

    volumes:
      # trurnasdata — NAS database (read-only)
      - type: bind
        source: /mnt/root_data_storage/users/sslh/trurnasdata
        target: /data
        read_only: true

      # persistentdata — Django SQLite DB + logs (read/write)
      - type: bind
        source: /mnt/root_data_storage/users/sslh/persistentdata
        target: /django_db

      # experiments — binary recording files (read-only)
      - type: bind
        source: /mnt/root_data_storage/experiments
        target: /experiments
        read_only: true

      # secrets — SSL certs generated on the host by deploy.sh (read-only)
      - type: bind
        source: ./secrets
        target: /app/secrets
        read_only: true
